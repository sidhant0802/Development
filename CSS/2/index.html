<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doc</title>
    <style>
        body{
            font-family:Arial;
            text-align:center;
        }
        .container{
            margin-top:40px;
        }
        .block{
            background-color: lightblue;
            margin:10px;
            padding: 20px;
        }
        .inline{
            background-color: lightgreen;
            padding: 10px;
        }
        .inline-block{
            background-color: orange;
            padding: 20px;
            width:120px;
            display: inline-block;
            margin:10px;
        }
    </style>
</head>
<body>
    <h1>inline v/s block </h1>
    <div class="container"></div>
    <h2> block element</h2>
    <div class="block">>element 1</div>
    <div class="block">element 2</div>
    <h2>inline element</h2>
    <span class="inline">inline 1</span>
    <span class="inline">inline 2</span>
    <span class="inline">inline 3</span>
    <h2>inline-block element</h2>
    <div class="inline-block">box1</div>
    <div class="inline-block">box2</div>
    <div class="inline-block">box3</div>
</body>
</html>
