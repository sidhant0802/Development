<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0px;
        }
        .navbar{
            position: sticky;
            top: 0px;
            background: #333;
            color:white;
            padding:15px;
            text-align: center;
        }
        .container{
            position: relative;
            background: #eee;
            height: 200px;
            margin: 20px;
        }
        .b{
            position: absolute;
            top: 10px;
            right:10px;
            background: red;
            color:white;
            padding: 5px 10px;
        }
        .chat{
            position: fixed;
            bottom:20px;
            right:20px;
            background: green;
            color: white;
            padding:15px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="navbar">
        sticky navbar
    </div>
    <div class="container">
        relative container
        <div class="b">absolute</div>
    </div>
    <div style="height:1000px; padding: 20px;">
        scroll to see stcky nav bar
    </div>
    <div class="chat">
        chat
    </div>
    
</body>
</html>
